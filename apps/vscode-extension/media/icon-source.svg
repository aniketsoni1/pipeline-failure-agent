<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4338CA"/>
      <stop offset="0.55" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="lens" x1="30" y1="26" x2="82" y2="78" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- rounded background -->
  <rect x="0" y="0" width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- magnifier handle -->
  <line x1="78" y1="76" x2="104" y2="102" stroke="#0B1020" stroke-opacity="0.25" stroke-width="15" stroke-linecap="round"/>
  <line x1="78" y1="76" x2="104" y2="102" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round"/>

  <!-- lens fill -->
  <circle cx="54" cy="52" r="31" fill="url(#lens)"/>

  <!-- pipeline inside the lens: two healthy nodes -> one failed node -->
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <line x1="40" y1="60" x2="54" y2="46"/>
    <line x1="54" y1="46" x2="68" y2="60"/>
  </g>
  <circle cx="40" cy="60" r="6" fill="#34D399"/>
  <circle cx="54" cy="46" r="6" fill="#34D399"/>
  <!-- failed node -->
  <circle cx="68" cy="60" r="8.5" fill="#F43F5E"/>
  <rect x="66.4" y="55" width="3.2" height="7" rx="1.6" fill="#FFFFFF"/>
  <circle cx="68" cy="65.4" r="1.9" fill="#FFFFFF"/>

  <!-- lens ring -->
  <circle cx="54" cy="52" r="31" fill="none" stroke="#0B1020" stroke-opacity="0.22" stroke-width="10"/>
  <circle cx="54" cy="52" r="31" fill="none" stroke="#FFFFFF" stroke-width="8"/>
</svg>
