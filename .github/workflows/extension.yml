name: VS Code Extension

on:
  pull_request:
    paths: ['apps/vscode-extension/**', 'packages/**']
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Install extension deps
        working-directory: apps/vscode-extension
        run: npm install
      - name: Bundle extension
        working-directory: apps/vscode-extension
        run: npm run build
      - name: Package VSIX
        working-directory: apps/vscode-extension
        run: npx --yes @vscode/vsce package --no-dependencies -o pipeline-failure-agent.vsix
      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: apps/vscode-extension/pipeline-failure-agent.vsix

  # Publishes ONLY when the relevant token secret is configured — otherwise each
  # step skips, so a tag push does not fail before you're ready to publish.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci && (cd apps/vscode-extension && npm install && npm run build)
      - name: Publish to VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: apps/vscode-extension
        run: npx --yes @vscode/vsce publish --no-dependencies
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: apps/vscode-extension
        run: npx --yes ovsx publish --no-dependencies -p "$OVSX_PAT"
      - name: Skip notice
        if: ${{ env.VSCE_PAT == '' && env.OVSX_PAT == '' }}
        run: echo "Neither VSCE_PAT nor OVSX_PAT is set — skipping extension publish."
