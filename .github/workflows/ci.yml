name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Typecheck · Lint · Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint --if-present
      - name: Unit + integration tests
        run: npm test

  e2e:
    name: CLI end-to-end
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Investigate a sample and fail on high-confidence incident
        run: |
          npm run cli -- investigate --platform databricks --run-id 551 --baseline 540 \
            --format json --output investigation.json --fail-on high || echo "exit=$?"
      - uses: actions/upload-artifact@v4
        with:
          name: investigation
          path: investigation.json
