version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
    ignore:
      # typescript-eslint's peer range is `>=4.8.4 <6.1.0`; TypeScript 7 (the
      # native port) is not yet supported and breaks `npm ci`. Hold the major
      # until typescript-eslint ships TS7 support, then bump deliberately.
      - dependency-name: typescript
        update-types: [version-update:semver-major]
  - package-ecosystem: npm
    directory: '/apps/vscode-extension'
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: '/'
    schedule: { interval: weekly }
