version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: npm
    directory: '/apps/vscode-extension'
    schedule: { interval: weekly }
  - package-ecosystem: github-actions
    directory: '/'
    schedule: { interval: weekly }
