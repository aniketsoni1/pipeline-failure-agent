name: Bug report
description: Report a problem with the CLI or extension
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Include the command you ran and the (redacted) output.
    validations: { required: true }
  - type: input
    id: version
    attributes: { label: Version (pipeline-agent --version) }
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options: [CLI, VS Code extension, Both]
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: I have removed secrets and sensitive data from logs/output.
          required: true
